---
hello_world:
  module: Hello
  class: HelloWorld
power_meter:
  module: PowerMeter
  class: PowerMeter
zendure_setpoint:
  module: ZendureSetpoint
  class: ZendureSetpoint
  update_interval: "20s"
  mqtt_topic_write: "iot/73bkTV/SE7546CU/properties/write"
  # dry_run: true = shadow (writes go to *_shadow sensors and shadow/<topic>
  # MQTT), false = live. Both apps must match.
  dry_run: false
  # External power-measurement sensors. Other sensors used by these apps
  # come from the Zendure HA integration (sensor.zendure_mqtt_*) and stay
  # hardcoded. See README.md for the physical-flow diagram.
  #   power_consumption     home load total
  #   solar_primary_power   primary inverter AC output (observability)
  #   solar_secondary_power uncontrolled inverter AC output (subtracted from demand)
  #   solar_input_power     DC into the Zendure hub (drives solar-only cap)
  power_inputs: &power_inputs
    power_consumption:     "sensor.power_consumption"
    solar_primary_power:   "sensor.zendure_mqtt_outputhomepower"
    solar_secondary_power: "sensor.hm_400_power"
    solar_input_power:     "sensor.zendure_mqtt_solarinputpower"
  max_cap: 720                         # W — outputLimit cap
  power_step: 30                       # W — quantization step
  power_target_bias_steps: 0.5         # half-step under-supply (small grid-import bias)
  batt_floor_after_bypass: 10          # %  — discharge floor inside the 10 h post-bypass window
  batt_floor_default: 20               # %  — discharge floor outside the post-bypass window
  soc_promote_to_free: 30              # %  — SoC at/above which we commit to drain for the cycle
  solar_threshold_w: 100               # W  — solar input above this counts as "real daytime"
  weekly_charge_force_hours: 174       # h  — without a confirmed bypass forces 'charge'
energy_meter_totals:
  module: EnergyMeterTotals
  class: EnergyMeterTotals
  update_interval: "5m"
  sensors:
    - sensor.hm_400_yieldtotal       # HM-400 (active)
    - sensor.hm_1500_yieldtotal_2    # HM-1500 current unit (active)
  # Fixed kWh accumulated by decommissioned inverters:
  #   HM-700 retired:            7.114 kWh
  #   HM-1500 original replaced: 134.176 kWh
  legacy_kwh_offset: 141.290

zendure_state_machine:
  module: ZendureStateMachine
  class: ZendureStateMachine
  mqtt_topic_write: "iot/73bkTV/SE7546CU/properties/write"
  dry_run: false                       # see zendure_setpoint.dry_run
  power_inputs: *power_inputs          # YAML anchor: same sensors as the setpoint app
  bypass_tracker:
    debounce_seconds: 60               # confirm bypass after this many seconds of stable predicate
    solar_threshold_w: 50              # solar must exceed this for the predicate (strict >)
    fallback_days_when_missing: 7      # bootstrap timestamp when sensor is missing/unparseable
  firmware_init:
    min_soc: 100                       # 10 % × 10 (Zendure stores minSoc ×10)
    pass_mode: 0                       # 0 = normal operation
