---
hello_world:
  module: Hello
  class: HelloWorld
power_meter:
  module: PowerMeter
  class: PowerMeter
zendure_state_machine:
  module: ZendureStateMachine
  class: ZendureStateMachine
  # update_interval accepts duration suffixes: "20s", "20min", "1h", "2hr", or a bare int (seconds).
  update_interval: "20min"
  mqtt_topic_write: "iot/73bkTV/SE7546CU/properties/write"
  mqtt_topic_read:  "iot/73bkTV/SE7546CU/properties/read"
  # 'dual' slots are battery-active hours; the state machine refines each to
  # charge / dual-limit / dual at runtime based on SoC (SM-18). The legacy
  # python_script makes the same decision dynamically over the same window.
  schedule:
    [serve, serve, serve, serve, serve, serve,
     dual, dual, dual, dual, dual, dual, dual, dual, dual,
     serve, serve, serve, serve, serve, serve, serve, serve, serve]
  low_batt_minsoc: 100             # 10 % * 10 (Zendure minSoc value, *10)
  med_batt_minsoc: 200             # 20 % * 10
  mode_pick_low_stop_pct: 20       # SoC <= this -> 'charge' during dual hours
  dual_limit_threshold_pct: 30     # SoC < this AND not from 'dual' -> 'dual-limit'
  weekly_charge_force_hours: 174   # 7.5d without bypass -> force 'charge'
  bypass_tracker:
    debounce_seconds: 60
    solar_threshold_w: 50
    fallback_days_when_missing: 7
zendure_setpoint:
  module: ZendureSetpoint
  class: ZendureSetpoint
  update_interval: "20s"
  mqtt_topic_write: "iot/73bkTV/SE7546CU/properties/write"
  dual_cap: 720                   # W — cap in 'dual' mode (battery drains freely)
  serve_cap: 540                  # W — cap in 'serve' (and unknown-mode fallback); lower to bound export overshoot when load drops between ticks
  power_step: 30
  batt_low_stop_after_bypass: 10  # % — floor inside the post-bypass window
  batt_low_stop_default: 20       # % — floor outside the post-bypass window (window is hard-coded 10 h)
  power_target_bias_steps: 0.5    # subtract this many steps from raw target
  batt_low_stop_hysteresis_pct: 5 # latch releases only after SoC recovers by this many %
